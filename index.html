<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>0500</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Aurora-themed personal productivity dashboard">
    <meta name="theme-color" content="#ffb090">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="0500">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.open-meteo.com https://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com https://api.rss2json.com https://nominatim.openstreetmap.org https://www.strava.com; worker-src 'self' blob:;">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- App Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">

    <!-- Splash Screens for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-startup-image" href="/icons/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px)">
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px)">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500&family=Inter:wght@200;300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css?v=52">

    <!-- Apply theme before first paint to avoid flash -->
    <script>
        (function() {
            var t = localStorage.getItem('0500_theme');
            if (t && t !== 'aurora') document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>

<div class="background"></div>
<div class="grid-overlay"></div>

<div class="dashboard" id="dashboard">
    <div class="top-bar">
        <div id="weather-display" class="weather-display"></div>
        <div class="clock-container">
            <div class="clock-hud-line left"></div>
            <div class="clock-wrapper">
                <div class="clock-text">
                    <span class="clock" id="clock">5:00</span>
                    <span class="clock-period" id="clock-period">AM</span>
                </div>
                <div class="clock-date" id="clock-date"></div>
                <div class="clock-progress" id="clock-progress"></div>
            </div>
            <div class="clock-hud-line right"></div>
        </div>
        <div id="top-right-group"></div>
    </div>

    <div class="main-content">
        <div class="goals-section" id="goals-section">
            <!-- Goals populated by JS -->
        </div>

        <div class="globe-section">
            <div class="globe-wrapper" id="globe-wrapper">
                <div id="globe-container"></div>
                <div class="globe-controls globe-controls-right">
                    <button class="globe-ctrl chip-news" id="chip-news" title="News layer">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><line x1="10" y1="6" x2="18" y2="6"/><line x1="10" y1="10" x2="18" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
                    </button>
                    <button class="globe-ctrl chip-clock" id="chip-clock" title="World clock">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="schedule-section hud-frame">
            <div class="hud-corners"></div>
            <div class="schedule-header">
                <span>TODAY</span>
                <div class="clear-schedule-anchor">
                    <button class="clear-schedule-btn" id="clear-schedule-btn" title="Clear schedule">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                    </button>
                    <div class="clear-schedule-popover" id="clear-schedule-popover">
                        <p class="clear-popover-text">Clear entire schedule?</p>
                        <div class="clear-popover-actions">
                            <button class="clear-popover-btn clear-popover-cancel" id="clear-cancel-btn">Cancel</button>
                            <button class="clear-popover-btn clear-popover-confirm" id="clear-confirm-btn">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="new-day-banner" id="new-day-banner" style="display:none;">
                <div class="new-day-banner-content">
                    <span class="new-day-banner-text">New day — clear yesterday's schedule?</span>
                    <div class="new-day-banner-actions">
                        <button class="new-day-btn new-day-clear" id="new-day-clear-btn">Clear</button>
                        <button class="new-day-btn new-day-keep" id="new-day-keep-btn">Keep</button>
                    </div>
                </div>
                <div class="new-day-missed" id="new-day-missed"></div>
            </div>
            <div class="schedule-scroll" id="schedule-scroll">
                <div class="time-grid" id="time-grid">
                    <!-- Time slots populated by JS -->
                </div>
                <div class="schedule-events" id="schedule-events">
                    <!-- Events populated by JS -->
                </div>
            </div>
        </div>

    </div>

    <!-- Compact chips row -->
    <div class="bottom-chips" id="bottom-chips">
        <!-- Tools -->
        <div class="chip-anchor">
            <button class="chip chip-fact" id="chip-fact">
                <span class="chip-label">FACT</span>
            </button>
            <div class="fact-card" id="fact-card">
                <div class="fact-card-header">
                    <div class="fact-card-title" id="daily-fact-title"></div>
                    <button class="fact-card-shuffle" id="fact-shuffle" title="Another fact">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
                    </button>
                </div>
                <div class="fact-card-text" id="daily-fact-text"></div>
            </div>
        </div>

        <div class="chip-anchor">
            <button class="chip chip-fitness" id="chip-fitness">
                <span class="chip-label">FITNESS</span>
                <span class="chip-value" id="chip-fitness-value"></span>
            </button>
            <div class="strava-card" id="strava-card">
                <div class="strava-card-header">
                    <span class="strava-card-title">FITNESS DIAGNOSTIC</span>
                    <div class="strava-card-actions">
                        <button class="strava-card-btn" id="strava-refresh" title="Refresh data">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                        </button>
                        <button class="strava-card-btn" id="strava-disconnect" title="Disconnect Strava">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                <!-- Setup view -->
                <div id="strava-setup">
                    <div class="strava-setup-hint">Connect your Strava account to see fitness diagnostics.</div>
                    <input type="text" class="strava-input" id="strava-client-id" placeholder="Client ID" spellcheck="false" autocomplete="off">
                    <input type="text" class="strava-input" id="strava-client-secret" placeholder="Client Secret" spellcheck="false" autocomplete="off">
                    <input type="text" class="strava-input" id="strava-refresh-token" placeholder="Refresh Token" spellcheck="false" autocomplete="off">
                    <div class="strava-setup-error" id="strava-setup-error"></div>
                    <button class="strava-connect-btn" id="strava-connect">CONNECT</button>
                    <div class="strava-setup-help">Get these from <a href="https://www.strava.com/settings/api" target="_blank" rel="noopener">strava.com/settings/api</a></div>
                </div>
                <!-- Data view -->
                <div id="strava-data" style="display:none">
                    <div id="strava-body"></div>
                </div>
            </div>
        </div>

        <div class="chip-anchor">
            <button class="chip chip-notes" id="chip-notes">
                <span class="chip-label">NOTES</span>
                <span class="chip-value" id="chip-notes-count"></span>
            </button>
            <div class="notes-card" id="notes-card">
                <div class="notes-card-header">
                    <span class="notes-card-title">NOTES</span>
                </div>
                <textarea class="notes-card-input" id="notes-input" placeholder="quick thoughts..." spellcheck="false" autocomplete="off" data-form-type="other" aria-label="Notes"></textarea>
            </div>
        </div>

        <button class="chip chip-books" id="chip-books">
            <span class="chip-label">BOOKS</span>
        </button>

        <button class="chip chip-people" id="chip-people">
            <span class="chip-label">PEOPLE</span>
        </button>

        <a class="chip chip-analytics visible" id="chip-analytics" href="analytics.html">
            <span class="chip-label">ANALYTICS</span>
        </a>

        <div class="chip-anchor">
            <button class="chip chip-intel" id="chip-intel">
                <span class="chip-label">JARVIS</span>
            </button>
            <div class="intel-card" id="intel-card">
                <div class="intel-card-header">
                    <span class="intel-card-title" id="intel-greeting">JARVIS</span>
                    <button class="intel-card-refresh" id="intel-refresh" title="Refresh">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    </button>
                </div>
                <input type="text" class="intel-card-input" id="intel-input" placeholder="ask me anything..." spellcheck="false" autocomplete="off">
                <div class="intel-card-body" id="intel-body"></div>
            </div>
        </div>

        <div class="chip-anchor">
            <button class="chip chip-focus" id="chip-focus">
                <span class="chip-label">FOCUS</span>
            </button>
            <div class="focus-card" id="focus-card">
                <div class="focus-card-header">
                    <span class="focus-card-title">FOCUS TIMER</span>
                </div>
                <div class="timer-bar" id="timer-bar">
                    <!-- Timer presets populated by JS -->
                </div>
            </div>
        </div>

        <button class="chip chip-rest" id="chip-rest">
            <span class="chip-label">REST</span>
            <span class="chip-value" id="chip-rest-countdown">0:00:00</span>
        </button>

        <!-- Data sync indicator -->
        <div class="sync-indicator" id="sync-indicator">
            <div class="status-indicator status-syncing"></div>
            <span>SYNCING</span>
        </div>
    </div>
</div>

<!-- Weekly Review Modal -->
<div class="modal-overlay" id="review-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-review">
        <div class="modal-header">
            <span class="modal-title">WEEK IN REVIEW</span>
            <button class="modal-close" id="review-modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body" id="review-modal-body">
            <!-- Populated by weekly-review.js -->
        </div>
    </div>
</div>

<div class="jarvis-toast-container" id="jarvis-toast-container"></div>

<div class="timer-overlay" id="timer-overlay">
    <canvas class="timer-globe" id="timer-globe-canvas"></canvas>
    <div class="timer-display" id="timer-display">25:00</div>
    <div class="timer-label">FOCUS TIME</div>
    <div class="timer-controls">
        <button class="timer-btn" id="timer-pause">PAUSE</button>
        <button class="timer-btn stop" id="timer-stop">END</button>
    </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Three.js (loaded before globe.gl so it uses global THREE) -->
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<!-- Globe.gl (Three.js globe) + TopoJSON for country borders -->
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<!-- Scripts -->
<script src="js/config.js?v=6"></script>
<script src="js/supabase.js?v=5"></script>
<script src="js/data.js?v=10"></script>
<script src="js/auth.js?v=4"></script>
<script src="js/animations.js?v=4"></script>
<script src="js/clock.js?v=4"></script>
<script src="js/goals.js?v=14"></script>
<script src="js/schedule.js?v=9"></script>
<script src="js/timer.js?v=4"></script>
<script src="js/globe.js?v=11"></script>
<script src="js/hud.js?v=5"></script>
<script src="js/weather.js?v=8"></script>
<script src="js/notes.js?v=5"></script>
<script src="js/sleep.js?v=19"></script>
<script src="js/weekly-review.js?v=2"></script>
<script src="js/theme.js?v=3"></script>
<script src="js/news.js?v=5"></script>
<script src="js/worldclock.js?v=5"></script>
<script src="js/facts.js?v=1"></script>
<script src="js/books.js?v=3"></script>
<script src="js/people.js?v=1"></script>
<script src="js/insights.js?v=4"></script>
<script src="js/jarvis-toast.js?v=1"></script>
<script src="js/strava.js?v=3"></script>
<script src="js/main.js?v=83"></script>

</body>
</html>
